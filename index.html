<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HTPgpt - AI Chat</title>
    <style>
        body { background: #0b0e11; color: #e9ecef; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-window { width: 100%; max-width: 450px; height: 80vh; background: #1c2128; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444c56; }
        #header { background: #2d333b; padding: 15px; border-radius: 15px 15px 0 0; text-align: center; color: #3fb950; font-weight: bold; border-bottom: 1px solid #444c56; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 80%; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #238636; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #30363d; border: 1px solid #444c56; border-bottom-left-radius: 2px; }
        #status { font-size: 12px; color: #8b949e; text-align: center; display: none; padding: 5px; }
        #input-area { padding: 15px; display: flex; gap: 10px; background: #21262d; border-radius: 0 0 15px 15px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: white; outline: none; }
        button { background: #238636; border: none; color: white; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="header">HTPgpt v1.0</div>
    <div id="messages">
        <div class="msg bot">Привет! Я HTPgpt. Можешь писать мне на русском или английском.</div>
    </div>
    <div id="status">Нейросеть думает...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Введите сообщение..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const API_TOKEN = "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";
    const MODEL_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";

    const messagesDiv = document.getElementById('messages');
    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDiv = document.getElementById('status');

    async function callAI() {
        const text = inputField.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inputField.value = '';
        statusDiv.style.display = 'block';

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${API_TOKEN}`,
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    inputs: `<s>[INST] Отвечай на русском языке. ${text} [/INST]`,
                    parameters: { max_new_tokens: 250 }
                }),
            });

            const data = await response.json();
            
            if (data.error) {
                addMessage("ИИ загружается (обычно это занимает 30 сек). Попробуй еще раз через мгновение.", "bot");
            } else {
                let aiText = data[0].generated_text.split('[/INST]').pop().trim();
                addMessage(aiText || "Я не смог придумать ответ...", "bot");
            }
        } catch (err) {
            addMessage("Ошибка связи с сервером.", "bot");
        } finally {
            statusDiv.style.display = 'none';
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.onclick = callAI;
    inputField.onkeypress = (e) => { if (e.key === 'Enter') callAI(); };
</script>

</body>
</html>
