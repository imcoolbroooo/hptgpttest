<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HTPgpt - Fixed CORS</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat { width: 400px; height: 500px; background: #161b22; border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
        #log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; font-size: 14px; max-width: 80%; }
        .u { align-self: flex-end; background: #238636; }
        .b { align-self: flex-start; background: #30363d; }
        #input-area { padding: 10px; background: #1c2128; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        button { padding: 10px 15px; background: #238636; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat">
    <div id="log"><div class="msg b">Ошибка CORS исправлена. Попробуй написать что-нибудь!</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Введите текст...">
        <button id="send-btn">></button>
    </div>
</div>

<script>
    // Твой зашифрованный токен (уже внутри)
    const secret = "aGZfa1hVTEhyTmJDdkdFYmdwTE9Sb0Fpd3RDdGFDa0lQdWFMSA==";
    const API_TOKEN = atob(secret);
    
    // МЕНЯЕМ МОДЕЛЬ НА ТУ, ЧТО НЕ БЛОКИРУЕТ БРАУЗЕР
    const MODEL_URL = "https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill";

    async function ask() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'u');
        input.value = '';

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${API_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();
            
            // Если модель еще спит (Error 503)
            if (data.error) {
                addMsg("ИИ просыпается... Подожди 10 сек и нажми кнопку еще раз.", "b");
            } else {
                const reply = data.generated_text || (data[0] && data[0].generated_text);
                addMsg(reply || "Я задумался, попробуй еще раз.", "b");
            }
        } catch (e) {
            addMsg("Ошибка соединения. Попробуй обновить страницу.", "b");
            console.error(e);
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = 'msg ' + s;
        d.innerText = t;
        document.getElementById('log').appendChild(d);
        document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    }

    document.getElementById('send-btn').onclick = ask;
    document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') ask(); };
</script>

</body>
</html>
