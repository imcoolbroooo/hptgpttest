<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HTPgpt Fixed</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat { width: 400px; height: 500px; background: #161b22; display: flex; flex-direction: column; border-radius: 12px; border: 1px solid #30363d; }
        #log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; font-size: 14px; max-width: 80%; }
        .u { align-self: flex-end; background: #238636; }
        .b { align-self: flex-start; background: #30363d; }
        #input-area { padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        button { padding: 10px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat">
    <div id="log"><div class="msg b">Я на связи. Если я долго не отвечаю, значит я просыпаюсь. Напиши что-нибудь!</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Сообщение...">
        <button id="send-btn">></button>
    </div>
</div>

<script>
    // Твой токен
    const API_TOKEN = "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";
    // Используем другую модель (более стабильную)
    const MODEL_URL = "https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill";

    const log = document.getElementById('log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    async function send() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'u');
        input.value = '';

        try {
            const response = await fetch(MODEL_URL, {
                headers: { "Authorization": `Bearer ${API_TOKEN}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ inputs: text }),
            });

            const data = await response.json();

            if (data.error) {
                addMsg("Модель загружается. Попробуй еще раз через 20 секунд.", "b");
            } else {
                // Blenderbot возвращает текст по-другому
                const reply = data.generated_text || data[0].generated_text;
                addMsg(reply, 'b');
            }
        } catch (e) {
            addMsg("Ошибка связи. Проверь токен или интернет.", "b");
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = 'msg ' + s;
        d.innerText = t;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    btn.onclick = send;
    input.onkeypress = (e) => { if (e.key === 'Enter') send(); };
</script>

</body>
</html>
