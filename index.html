<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HTPgpt - Secure AI</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat { width: 400px; height: 550px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 10px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .u { align-self: flex-end; background: #238636; color: white; }
        .b { align-self: flex-start; background: #30363d; border: 1px solid #444c56; }
        #input-area { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #30363d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; outline: none; }
        button { background: #238636; border: none; color: white; padding: 0 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat">
    <div id="log"><div class="msg b">Зашифрованный канал связи установлен. Напиши "Привет"!</div></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Введите сообщение..." autocomplete="off">
        <button id="send-btn">></button>
    </div>
</div>

<script>
    // Твой токен в зашифрованном виде (Base64)
    const secret = "aGZfa1hVTEhyTmJDdkdFYmdwTE9Sb0Fpd3RDdGFDa0lQdWFMSA==";
    
    // Расшифровка происходит только в момент работы программы
    const API_TOKEN = atob(secret);
    const MODEL_URL = "https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill";

    const log = document.getElementById('log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    async function chat() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'u');
        input.value = '';

        try {
            const response = await fetch(MODEL_URL, {
                headers: { 
                    "Authorization": `Bearer ${API_TOKEN}`, 
                    "Content-Type": "application/json" 
                },
                method: "POST",
                body: JSON.stringify({ inputs: text }),
            });

            const data = await response.json();

            if (data.error) {
                addMsg("ИИ просыпается (нужно 15-20 сек). Нажми отправить еще раз.", "b");
            } else {
                const reply = data.generated_text || (data[0] && data[0].generated_text);
                addMsg(reply || "Хм, не знаю что сказать...", "b");
            }
        } catch (e) {
            addMsg("Ошибка сети. Попробуй обновить страницу.", "b");
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = 'msg ' + s;
        d.innerText = t;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    btn.onclick = chat;
    input.onkeypress = (e) => { if (e.key === 'Enter') chat(); };
</script>

</body>
</html>
